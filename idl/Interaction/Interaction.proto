syntax = "proto3";

package interaction;

option go_package = "tiktok-go/interaction";

import "api.proto";
import "common.proto";
import "model.proto";

// 点赞请求
message LikeReq {
  string videoID = 1[(api.form) = 'video_id'];
  string commentID = 2[(api.form) = 'comment_id'];
  LikeAction actionType = 3[(api.form) = 'action_type,required'];
  enum LikeAction {
    _ = 0;
    Like = 1;
    Unlike = 2;
  }
}

// 点赞响应
message LikeResp {
  // 响应状态
  common.Base Base = 1;
}

// 点赞列表请求
message ListLikeReq {
  // 用户ID
  string userID = 1[(api.query) = 'user_id,required'];
  // 页码
  string pageNum = 2[(api.query) = 'page_num,required'];
  // 单页尺寸
  string pageSize = 3[(api.query) = 'page_size,required'];
}

// 点赞列表响应
message ListLikeResp {
  // 响应状态
  common.Base Base = 1;
  // 响应数据
  VideoData data = 2;
  // 视频数据
  message VideoData {
    // 视频
    repeated model.Video items = 1;
  }
}

// 评论请求
message CommentReq {
  string videoID = 1[(api.form) = 'video_id'];
  string commentID = 2[(api.form) = 'comment_id'];
  string content = 3[(api.form) = 'content,required'];
}

// 评论响应
message CommentResp {
  // 响应状态
  common.Base Base = 1;
}

// 评论列表请求
message ListCommentReq {
  // 视频ID
  string videoID = 1[(api.query) = 'video_id'];
  // 评论ID
  string commentID = 2[(api.query) = 'comment_id'];
  // 页码
  string pageNum = 3[(api.query) = 'page_num,required'];
  // 单页尺寸
  string pageSize = 4[(api.query) = 'page_size,required'];
}

// 评论列表响应
message ListCommentResp {
  // 响应状态
  common.Base Base = 1;
  // 响应数据
  CommentData data = 2;
  // 评论数据
  message CommentData {
    // 评论
    repeated model.Comment items = 1;
  }
}

// 删除评论请求
message DeleteCommentReq {
  string commentID = 2[(api.form) = 'comment_id,required'];
}

// 删除评论响应
message DeleteCommentResp {
  // 响应状态
  common.Base Base = 1;
}


service InteractionHandler {
  // 点赞操作
  rpc Like(LikeReq) returns(LikeResp) {
    option (api.post) = "/like/action";
  }
  // 点赞列表
  rpc ListLike(ListLikeReq) returns(ListLikeResp) {
    option (api.get) = "/like/list";
  }
  // 评论
  rpc Comment(CommentReq) returns(CommentResp) {
    option (api.post) = "/comment/publish";
  }
  // 评论列表
  rpc ListComment(ListCommentReq) returns(ListCommentResp) {
    option (api.get) = "/comment/list";
  }
  // 删除评论
  rpc DeleteComment(DeleteCommentReq) returns(DeleteCommentResp) {
    option (api.delete) = "/comment/delete";
  }
}