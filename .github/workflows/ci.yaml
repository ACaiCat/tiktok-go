name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        shell: bash
        run: go build -v -o publish/main${{ matrix.platform == 'win-x64' && '.exe' || '' }} .

      - name: Copy example config
        shell: bash
        run: |
          mkdir publish/config
          cp config/config.yaml.example publish/config/config.yaml

      - name: Zip Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'tiktok-go-${{ matrix.platform }}.zip'
          directory: 'publish'
          path: '.'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tiktok-go-${{ matrix.platform }}
          path: publish/*.zip

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write

